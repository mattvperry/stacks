name: metrics

services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.55.1@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    command: --store_container_labels=false
    restart: unless-stopped
    devices:
      - /dev/kmsg:/dev/kmsg
    privileged: true

  ##
  # Dashboard and query interface
  ##
  grafana:
    image: docker.io/grafana/grafana:13.0@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./config/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SERVER_ROOT_URL=https://logs.mattvperry.com
      - GF_AUTH_OAUTH_ALLOW_INSECURE_EMAIL_LOOKUP=true
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=${GF_VL_PLUGIN};victorialogs-datasource,${GF_VM_PLUGIN};victoriametrics-datasource
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=victorialogs-datasource,victoriametrics-datasource
    restart: unless-stopped
    labels:
      - homepage.group=System
      - homepage.name=Grafana
      - homepage.icon=grafana
      - homepage.href=https://logs.mattvperry.com
      - homepage.description=Dashboards and Monitoring
  node_exporter:
    image: docker.io/prom/node-exporter:v1.11.1@sha256:e9cff4fc67b1818f8c97adb115b9f12c9a54b533de86765d4a0effc01b357205
    container_name: node_exporter
    volumes:
      - /:/host:ro,rslave
    network_mode: host
    command:
      - --web.listen-address=172.17.0.1:9100
      - --path.rootfs=/host
    restart: unless-stopped
    pid: host

  ##
  # Collection aggregation
  ##
  vector:
    image: docker.io/timberio/vector:0.55.0-alpine@sha256:faf14cdafb5526a94b478b2a51055b774b92761c2a22ce3af1fa416a67b75939
    container_name: vector
    depends_on:
      victorialogs:
        condition: service_healthy
      victoriametrics:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker:/var/lib/docker
      - ./config/vector.yaml:/etc/vector/vector.yaml:ro
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped

  ##
  # Log aggregation
  ##
  victorialogs:
    image: docker.io/victoriametrics/victoria-logs:v1.50.0@sha256:ae9bea8d8a3b0fc47c7f0058bcca410e79c84b4a0acd12d4dac71b9302526590
    container_name: victorialogs
    volumes:
      - victorialogs_data:/vlogs
    command:
      - -storageDataPath=/vlogs
      - -loggerFormat=json
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://victorialogs:9428/health" ]
      interval: 1s
      timeout: 1s
      retries: 10

  ##
  # Metric aggregation
  ##
  victoriametrics:
    image: docker.io/victoriametrics/victoria-metrics:v1.142.0@sha256:67cdc4722232cbcbe15dc09850d983df8857eea9b7194b85e979275315ac2ce2
    container_name: victoriametrics
    volumes:
      - victoriametrics_data:/vmsingle
      - ./config/scrape.yaml:/promscrape.yaml
    command:
      - -storageDataPath=/vmsingle
      - -promscrape.config=/promscrape.yaml
      - -loggerFormat=json
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://victoriametrics:8428/health" ]
      interval: 1s
      timeout: 1s
      retries: 10

volumes:
  victorialogs_data:
  victoriametrics_data:
  grafana_data:
