name: unifi

services:
  orb-docker:
    image: orbforge/orb:1.5.1@sha256:9cdcdd6b5d7854d724f21972eed6d1c1eb40a332225d0ec572fd7de1731a6880
    container_name: orb-sensor
    volumes:
      - orb_data:/root/.config/orb
    network_mode: host
    restart: unless-stopped

  unifi-os:
    image: ghcr.io/lemker/unifi-os-server:v1.3.0@sha256:445c3350bdb44ac68a7770e151a9fe17c7336cf8f4682316e0b66ac05faa6916
    container_name: unifi-os
    cgroup: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    tmpfs:
      - /run:exec
      - /run/lock
      - /tmp:exec
      - /var/lib/journal
      - /var/opt/unifi/tmp:size=64m
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - unifi_os_persist:/persistent
      - unifi_os_log:/var/log
      - unifi_os_data:/data
      - unifi_os_srv:/srv
      - unifi_os_home:/var/lib/unifi
      - unifi_os_monogo:/var/lib/mongodb
      - unifi_os_rabbit:/etc/rabbitmq/ssl
    environment:
      - UOS_SYSTEM_IP=192.168.1.100
    ports:
      - '11443:443'
      - '3478:3478/udp'
      - '8080:8080'
      - '8443:8443'
      - '10003:10003/udp'
      - '10001:10001/udp'
    restart: unless-stopped
    labels:
      - homepage.group=Network
      - homepage.name=Unifi
      - homepage.icon=unifi
      - homepage.href=https://unifi.mattvperry.com
      - homepage.description=Network management
      - homepage.widget.type=unifi
      - homepage.widget.url=https://unifi-os:443
      - homepage.widget.key=${UNIFI_API}
      - homepage.widget.fields=["uptime","wlan_devices"]

volumes:
  unifi_os_persist:
  unifi_os_log:
  unifi_os_data:
  unifi_os_srv:
  unifi_os_home:
  unifi_os_monogo:
  unifi_os_rabbit:
  orb_data:
