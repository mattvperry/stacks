name: unifi

services:
  orb-docker:
    image: orbforge/orb:1.4.10@sha256:81413e01a7ea693c1d16a1b0891fba1f8278526397cd9b39b1e82f13b8c14413
    container_name: orb-sensor
    volumes:
      - orb_data:/root/.config/orb
    network_mode: host
    restart: unless-stopped

  unifi-db:
    image: docker.io/mongo:8.0-noble@sha256:1773d7826e340cd966f439a4e71abea42fd9ca70ddce1ab6b96eb76013c3ca8e
    container_name: unifi-db
    volumes:
      - mongo_db:/data/db
      - /var/lib/mongodb/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
      - MONGO_USER=unifi
      - MONGO_PASS=${MONGO_PASS}
      - MONGO_DBNAME=unifi
      - MONGO_AUTHSOURCE=admin
    restart: unless-stopped

  unifi-os:
    image: ghcr.io/lemker/unifi-os-server:5.0.6@sha256:5e17e4492cca4ed5b821ea57c5cd51f524b46a25ee02c6b7a22a9a59807bd647
    container_name: unifi-os
    privileged: true
    volumes:
      - unifi_os_persist:/persistent
      - unifi_os_log:/var/log
      - unifi_os_data:/data
      - unifi_os_srv:/srv
      - unifi_os_home:/var/lib/unifi
      - unifi_os_monogo:/var/lib/mongodb
      - unifi_os_rabbit:/etc/rabbitmq/ssl
    environment:
      - UOS_SYSTEM_IP=192.168.1.100
    ports:
      - '11443:443'
      - '3478:3478/udp'
      - '8080:8080'
      - '8443:8443'
      - '10003:10003/udp'
    networks:
      default:
        aliases:
          - unifi
    restart: unless-stopped

  unifi-network-app:
    image: docker.io/linuxserver/unifi-network-application:10.1.85@sha256:ab78c33325243895743c1524eda94ac351d60f9e7f0e07b74ab25bffb3eb2550
    container_name: unifi-network-app
    volumes:
      - unifi_config:/config
    environment:
      - PUID=113
      - PGID=113
      - TZ=America/New_York
      - MONGO_USER=unifi
      - MONGO_PASS=${MONGO_PASS}
      - MONGO_HOST=unifi-db
      - MONGO_PORT=27017
      - MONGO_DBNAME=unifi
      - MONGO_AUTHSOURCE=admin
 #   ports:
 #     - '3478:3478/udp'
 #     - '8080:8080'
 #     - '8443:8443'
 #     - '10001:10001/udp'
    networks:
      default:
        aliases:
          - unifi
    restart: unless-stopped
    labels:
      - homepage.group=Network
      - homepage.name=Unifi
      - homepage.icon=unifi
      - homepage.href=https://unifi.mattvperry.com
      - homepage.description=Network management
      - homepage.widget.type=unifi
      - homepage.widget.url=https://unifi:8443
      - homepage.widget.username=${UNIFI_USER}
      - homepage.widget.password=${UNIFI_PASS}
      - homepage.widget.fields=["uptime","wlan_devices"]

volumes:
  unifi_os_persist:
  unifi_os_log:
  unifi_os_data:
  unifi_os_srv:
  unifi_os_home:
  unifi_os_monogo:
  unifi_os_rabbit:
  mongo_db:
  unifi_config:
  orb_data: