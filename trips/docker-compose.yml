name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.12@sha256:4771f2b846e1467b286289ab1b1227932131ceb61809a5b481e6ba19ebfc7184
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
