name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.4@sha256:f4c28435c5cf169bcd3f10c75338a2f18a72cbe5093fe74d63205f20e624612b
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
