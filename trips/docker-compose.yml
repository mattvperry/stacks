name: trips

services:
  trek:
    image: mauriceboe/trek:2.8.4@sha256:bbc3e39177cc36c55bb33baeb32c78c9a6823b2a29d1c98213f7c791d607b499
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
