name: trips

services:
  trek:
    image: mauriceboe/trek:3.2.1@sha256:4487220f57870b83856f5d3f3ba7a80725df73f76036c37fe425e1e9168b45f7
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
