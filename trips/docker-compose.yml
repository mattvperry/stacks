name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.10@sha256:38ef5e8ea7b81a5bef18fbad7f59c670825f25866081b055a0bc712509ae2431
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
