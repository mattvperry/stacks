name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.10@sha256:efd0ddcb5923d0ea75e1f040d2dcc4b367979c99d4c8b0d8036e10e1ab1f2a60
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
