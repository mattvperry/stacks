name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.8@sha256:b1ff54e32c5f3ebf1f810dabcf0734a6c5dd71b4501277ddca424c873d9be90a
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
