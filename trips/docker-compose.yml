name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.1@sha256:45af7106bb3195e84f4de86d6a8170e5617b0d7f379a45cb69bf174786ee3c0f
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
