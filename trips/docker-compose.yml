name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.2@sha256:4138ce2b58c2fa67845d86e95e2199c0e816d3de453e922e9e9600e6cc4f6baa
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
