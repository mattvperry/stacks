name: trips

services:
  trek:
    image: mauriceboe/trek:3.1.2@sha256:9a541b6c40fb382ed51f7409a2dad01130075dd69cf7e85ec4963bbabf09512d
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
