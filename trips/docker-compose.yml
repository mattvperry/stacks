name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.2@sha256:f98e24586e97af7881637f88e790c45dfb5520855c685adb55d93f6ae33ac5ea
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
