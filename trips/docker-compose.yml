name: trips

services:
  trek:
    image: mauriceboe/trek:3.1.3@sha256:ae2198bf2133a9363fa8774f4666ba464c0c01ec4e30844f077d1c6116e3b6cb
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
