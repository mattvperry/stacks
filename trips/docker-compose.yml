name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.3@sha256:332d4e7d02a2b5fd059395764661c28bd7fe0c22b48eb62137035dd0735f3fc1
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
