name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.16@sha256:8ffc7bee5779b9cf4c19d0b2ac3f384f8ddfa20527d29d1a03c999ea91daf17b
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
