name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.2@sha256:e33a47f987d8fed491cc1b13108d99ff4c6bb5c7860a859ecf6c1189f6a0a5ca
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
