name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.20@sha256:96c900fe6447a8aa5f882f712ad2e3bd2d522eac07f2981d144951e31bc35187
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
