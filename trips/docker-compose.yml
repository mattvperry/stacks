name: trips

services:
  trek:
    image: mauriceboe/trek:3.1.0@sha256:99697a488ae43cb839ea9a27e3939768613b1f334f9aaaa0041f52ccfec7b43e
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
