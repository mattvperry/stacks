name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.0@sha256:0e355c837a246d06c9950cb2f1e562fe47c2c35b20d2640cfa365d5d7d309a05
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
