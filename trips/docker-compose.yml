name: trips

services:
  trek:
    image: mauriceboe/trek:3.4.0@sha256:78cbaf2615660e0228e69e03c7cfd8d588f5ec1f600c21b66ffd3347c3e7c18a
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
