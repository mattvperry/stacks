name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.8@sha256:80ab2628a83306ab280afc97fb183d19aba96a5ae4040b12f6253fa9158664e9
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
