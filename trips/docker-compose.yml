name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.12@sha256:1d62e33088cb275a8688bacf6050bdbf91d01093861a9069feb227ae1d193630
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
