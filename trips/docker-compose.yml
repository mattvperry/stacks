name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.7@sha256:220d5f553e23018a37a887cf78b2e02218221eacbc2535a7b67e4dbff5513746
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
