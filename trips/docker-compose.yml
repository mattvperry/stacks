name: trips

services:
  trek:
    image: mauriceboe/trek:2.8.1@sha256:413322b082b6e1cf9705dd3a617dc2d85102e275e62f862d0f9c7798f8ab9981
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
