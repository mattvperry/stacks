name: trips

services:
  trek:
    image: mauriceboe/trek:3.2.0@sha256:e5588fcc6dad04c6b95c8a4690d3ea2415af292462fe0653560066974664ad6f
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
