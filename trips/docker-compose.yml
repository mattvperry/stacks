name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.2@sha256:64f8ab519cbddac981f954fd42af1998c5a772063c2429829ddb86c520f2848d
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
