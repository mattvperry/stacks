name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.18@sha256:bb66f6a8a506a1b01896f31f32004d397bab1369bb4b73319cc4079e84bd39bc
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
