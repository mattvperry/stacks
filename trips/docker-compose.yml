name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.1@sha256:555f58fdf648d5e2611995337b8f8d95281deb3082241ebf0129f3d6062a5c2f
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
