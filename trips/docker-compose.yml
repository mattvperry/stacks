name: trips

services:
  trek:
    image: mauriceboe/trek:3.1.1@sha256:67779cdd0e17a494e4c8ab2b408239bd31174fef113fd05fb276437748f09dce
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
