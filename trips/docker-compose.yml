name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.17@sha256:2b36d64bec17c2c52eba2dcf12626f936f666e73ae6eba3d6130ba0c1e94cdbc
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
