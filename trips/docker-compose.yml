name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.2@sha256:d0a0df4f4c1a6f0589dad433a0c1d0d86c53ff2285bf0d6f59003bebc5eb96db
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
