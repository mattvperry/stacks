name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.15@sha256:fbd2e1931ef770cfa4b8fd4bfca1693dece5425548443fe3d404f5158f5ce087
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
