name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.6@sha256:edcaa1d15d7b3163a39faedcc832d450b5c4c2d49102aca6825ce8ad437bf988
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
