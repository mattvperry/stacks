name: trips

services:
  trek:
    image: mauriceboe/trek:3.1.4@sha256:815b19a45b264d1ddfd8f3df394308f9d6307b26de45378630ba8179bc7691ad
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
