name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.0@sha256:34bba6bd0eb891abd4001760b921b5fe8049966ba817c3ace88923b82d578bb5
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
