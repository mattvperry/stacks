name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.11@sha256:b6d139cccb3a897749d6cec505d8d98f685653d2ca67c95ab87d622a4282e595
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
