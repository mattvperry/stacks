name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.9@sha256:db6b0a558140d35dcd5dd54725c85d624ce605ee72758ae2101ba7bff0a9c8e4
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
