name: trips

services:
  trek:
    image: mauriceboe/trek:2.8.3@sha256:2ef5e257ec7c782e0e685a68bad8563c049531fd92a34d29f3cba6972d35c523
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
