name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.0@sha256:bccb2ad2151422a54a2fae88fcdbdbd6be6b95e219c1d21d7d475846ed624fc9
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
