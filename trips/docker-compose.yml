name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.0@sha256:7e3de0e63a5533170fc1b936be79b6c4b5d62e1b490ef7701b2485a6c9bcabd1
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
