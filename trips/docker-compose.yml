name: trips

services:
  trek:
    image: mauriceboe/trek:2.8.0@sha256:4cf9e39e15fc479453f299b0954b082bee7ddcdd147272167cfea15f89154b48
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
