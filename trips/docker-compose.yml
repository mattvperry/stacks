name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.9@sha256:03f02eacf04c76c8561dbf0daad0e19043dde14a6ad65d1febdfb05f3583be10
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
