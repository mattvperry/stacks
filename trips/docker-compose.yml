name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.2@sha256:0266e35f5737a53ea04a4247f35a4094d9382338b844baa91e64686b6b49f921
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
