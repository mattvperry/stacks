name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.1@sha256:a98759de718bbaa293dbcb9536446e381e91a745652c71ba65e172e258579811
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
