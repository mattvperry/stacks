name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.1@sha256:6ba93b724e92a92d781639dfb6c64ffe76326567627da8407b10bcc03614ca5d
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
