name: trips

services:
  trek:
    image: mauriceboe/trek:3.0.11@sha256:054f10a4df54bc48c4db672cf1141d1985be8551da8c56a5c746c0921d401c31
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
