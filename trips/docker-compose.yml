name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.3@sha256:2b80c098d206c5b69436a2c64baa4676026f4ba80355438b2a5abab879ce4c3f
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
