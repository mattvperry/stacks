name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.0@sha256:b7ce5dcc0a8d84522fcb4c680d33bc8e225de6bb1b9e714e6a62428b2f0ded32
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
