name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.2@sha256:05a7d0733391265eff583f25ee3b63e616adc3825c600e96680a64f27788f49a
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
