name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.0@sha256:5ea4d169a1b1d6840b236f1e38299119744a1104aae6b5ffe04f20e69fb4fbe1
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
