name: trips

services:
  trek:
    image: mauriceboe/trek:2.7.1@sha256:73f1d93bd268700e584a4f21765930662e0dd85fbc747a7b6a56c8c05573766b
    container_name: trek
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
