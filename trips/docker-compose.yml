name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.14@sha256:189cca7740af79c714c64e337691dc5224ff3c511cfb74d7d4599d4b54adab8f
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
