name: trips

services:
  trek:
    image: mauriceboe/trek:2.9.13@sha256:c56d2d346df4c981b750e207af9ab2302d8410c6aeddf29c6a8887b1d0a651bf
    container_name: trek
    environment:
      - APP_URL=https://trips.mattvperry.com
      - OIDC_ONLY=true
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  data:
  uploads:
