name: media

services:
  maintainerr:
    image: ghcr.io/maintainerr/maintainerr:3.7.0@sha256:bfc9d16c3f752e17432e5a66df5bbeb4c115698f9dd496ee03fd0aa9ef3dca52
    container_name: maintainerr
    volumes:
      - maintainerr_data:/opt/data
    environment:
      - TZ=Europe/Brussels
      - BASE_PATH=/maintain
    restart: unless-stopped

  dispatcharr:
    image: ghcr.io/dispatcharr/dispatcharr:0.23.0@sha256:b731cda8daa302c5bc28f5031158895f9996c4b1995d7f292e96d4a7461c6263
    container_name: dispatcharr
    ports:
      - '9191:9191'
    volumes:
      - dispatcharr_data:/data
    environment:
      - DISPATCHARR_ENV=aio
      - REDIS_HOST=localhost
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - DISPATCHARR_LOG_LEVEL=info
    devices:
      - /dev/dri:/dev/dri
    restart: unless-stopped

  nzbget:
    image: docker.io/linuxserver/nzbget:26.1.20260417@sha256:9cbe95f67ce96c9d18547dc3c10766b5def33217934afa87e11760167a7bd27d
    container_name: nzbget
    volumes:
      - nzbget_config:/config
      - /media/trinity/.usenet:/data/.usenet
    environment:
      - PUID=974
      - PGID=1001
      - TZ=America/New_York
    restart: unless-stopped
    labels:
      - homepage.group=Downloads
      - homepage.name=NZBGet
      - homepage.icon=nzbget
      - homepage.href=https://mattvperry.com/nzb/
      - homepage.description=Usenet downloader
      - homepage.widget.type=nzbget
      - homepage.widget.url=http://nzbget:6789

  seerr:
    image: ghcr.io/seerr-team/seerr:v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
    container_name: seerr
    volumes:
      - overseerr_config:/app/config
    environment:
      - TZ=America/New_York
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://seerr:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    labels:
      - homepage.group=Media
      - homepage.name=Seerr
      - homepage.icon=overseerr
      - homepage.href=https://media.mattvperry.com
      - homepage.description=Media requests
      - homepage.widget.type=overseerr
      - homepage.widget.url=http://seerr:5055
      - homepage.widget.key=${OVERSEERR_API}

  plex:
    image: docker.io/linuxserver/plex:1.43.1@sha256:e5c7c283b242966416a4bed2d666acf6f3fb8f957c704be8333f8dc987364825
    container_name: plex
    volumes:
      - plex_config:/config
      - /media/trinity:/data
    environment:
      - PUID=421
      - PGID=1001
      - TZ=America/New_York
      - VERSION=latest
    network_mode: host
    restart: unless-stopped
    labels:
      - homepage.group=Media
      - homepage.name=Plex
      - homepage.icon=plex
      - homepage.href=https://plex.mattvperry.com/
      - homepage.description=Media library
      - homepage.widget.type=plex
      - homepage.widget.url=https://plex.mattvperry.com
      - homepage.widget.key=${PLEX_API}
    devices:
      - /dev/dri:/dev/dri

  prowlarr:
    image: docker.io/linuxserver/prowlarr:2.3.5@sha256:6df73ab9e99d0dbaad27c39d8a47c600333eebea80fcb56253a0bb8b630c8115
    container_name: prowlarr
    volumes:
      - prowlarr_config:/config
    environment:
      - PUID=977
      - PGID=977
      - TZ=America/New_York
    restart: unless-stopped
    labels:
      - homepage.group=Downloads
      - homepage.name=Prowlarr
      - homepage.icon=prowlarr
      - homepage.href=https://mattvperry.com/index/
      - homepage.description=Usenet indexer
      - homepage.widget.type=prowlarr
      - homepage.widget.url=http://prowlarr:9696
      - homepage.widget.key=${PROWLARR_API}

  radarr:
    image: docker.io/linuxserver/radarr:6.1.1@sha256:b01097ad2d948c9f5eca39eb60bb529e2e55b0738c4bf7db09383bef0abab59d
    container_name: radarr
    volumes:
      - radarr_config:/config
      - /media/trinity:/data
    environment:
      - PUID=986
      - PGID=1001
      - TZ=America/New_York
    restart: unless-stopped
    labels:
      - homepage.group=Media
      - homepage.name=Radarr
      - homepage.icon=radarr
      - homepage.href=https://mattvperry.com/movies/
      - homepage.description=Movie management
      - homepage.widget.type=radarr
      - homepage.widget.url=http://radarr:7878
      - homepage.widget.key=${RADARR_API}
      - homepage.widget.enableQueue=true

  sonarr:
    image: docker.io/linuxserver/sonarr:4.0.17@sha256:e6c9a091735fede0c2a205c69e7d4c2f0188eaf2bec7e42d8a26c017e5f2a910
    container_name: sonarr
    volumes:
      - sonarr_config:/config
      - /media/trinity:/data
    environment:
      - PUID=991
      - PGID=1001
      - TZ=America/New_York
    restart: unless-stopped
    labels:
      - homepage.group=Media
      - homepage.name=Sonarr
      - homepage.icon=sonarr
      - homepage.href=https://mattvperry.com/tv/
      - homepage.description=Television management
      - homepage.widget.type=sonarr
      - homepage.widget.url=http://sonarr:8989
      - homepage.widget.key=${SONARR_API}
      - homepage.widget.enableQueue=true

  tautulli:
    image: docker.io/linuxserver/tautulli:2.17.0@sha256:f8a0c2069bf4393f13731e9f98835f32b0a21659686f88223836c1693036f2be
    container_name: tautulli
    volumes:
      - tautulli_config:/config
    environment:
      - PUID=421
      - PGID=1001
      - TZ=America/New_York
    restart: unless-stopped
    labels:
      - homepage.group=Media
      - homepage.name=Tautulli
      - homepage.icon=tautulli
      - homepage.href=https://mattvperry.com/stats
      - homepage.description=Media statistics
      - homepage.widget.type=tautulli
      - homepage.widget.url=http://tautulli:8181/stats
      - homepage.widget.key=${TAUTULLI_API}

  transmission:
    image: docker.io/linuxserver/transmission:4.1.1@sha256:1bfdc7676c050109b599feb4ce1016d4b6977a0b2e45cee9b25a38c9134e769e
    container_name: transmission
    volumes:
      - transmission_config:/config
      - /media/trinity/.torrents:/data/.torrents
    environment:
      - PUID=169
      - PGID=1001
      - TZ=America/New_York
    ports:
      - '51413:51413'
      - '51413:51413/udp'
    restart: unless-stopped
    labels:
      - homepage.group=Downloads
      - homepage.name=Transmission
      - homepage.icon=transmission
      - homepage.href=https://mattvperry.com/torrent/web/
      - homepage.description=Torrent downloader
      - homepage.widget.type=transmission
      - homepage.widget.url=http://transmission:9091/
      - homepage.widget.rpcUrl=transmission/

volumes:
  transmission_config:
  nzbget_config:
  prowlarr_config:
  radarr_config:
  sonarr_config:
  tautulli_config:
  plex_config:
  overseerr_config:
  maintainerr_data:
  dispatcharr_data:
