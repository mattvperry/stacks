name: unifi

services:
  autocaliweb:
    image: gelbphoenix/autocaliweb:v0.12.10@sha256:bf1ce819593f997bbf12624678d71bd7b3d1a2fccec2862a60f5b9d2cc84abe8
    container_name: autocaliweb
    environment:
      - TZ=America/New_York
      - PUID=1000
      - PGID=1001
    volumes:
      - autocaliweb_config:/config
      - bookdrop:/acw-book-ingest
      - /media/trinity/books:/calibre-library
    stop_signal: SIGINT
    stop_grace_period: 15s
    restart: unless-stopped

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.35.1@sha256:1eef6716183c52abafe5405e7d6be8390248ecd59c7488c44af871757ac8fc4d
    container_name: audiobookshelf
    environment:
      - TZ=America/New_York
    volumes:
      - /media/trinity/audiobooks:/audiobooks
      - abs_config:/config
      - abs_metadata:/metadata
    restart: unless-stopped

  shelfmark:
    image: ghcr.io/calibrain/shelfmark:v1.3.0@sha256:e891eda444b261da48a839db652034bce4e20ac09c167f14adf939dedf96b572
    container_name: shelfmark
    environment:
      - PUID=1000
      - PGID=1001
      - HIDE_LOCAL_AUTH=true
      - DISABLE_LOCAL_AUTH=true
      - OIDC_AUTO_REDIRECT=true
    volumes:
      - bookdrop:/bookdrop
      - shelfmark_config:/config
      - /media/trinity/audiobooks:/audiobooks
      - /media/trinity/.usenet/complete/books:/media/trinity/.usenet/complete/books
    networks:
      - default
      - media_default
    restart: unless-stopped

volumes:
  autocaliweb_config:
  abs_config:
  abs_metadata:
  shelfmark_config:
  bookdrop:

networks:
  default:
  media_default:
    external: true
