name: pterodactyl

services:
  cron:
    image: ccarney16/pterodactyl-panel:v1.12.4@sha256:10fc65ed7b0f7fa5b3717de2d64c7bd08a9fcf0d64fba468d40cd5523a83781b
    container_name: pterodactyl_cron
    volumes:
      - panel:/data
    env_file: ./panel.env
    command: p:cron
    restart: unless-stopped

  ##
  # -- Pterodactyl Daemon --
  # This service provides the wings runtime.
  ##
  daemon:
    image: docker.io/ccarney16/pterodactyl-daemon:v1.12.3@sha256:f209707914d8eb4d786d6fc2596a06f8e9d907be5992d64936739a19eac930f5
    container_name: pterodactyl_wings
    volumes:
      - /var/lib/pterodactyl:/var/lib/pterodactyl
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/pterodactyl:/tmp/pterodactyl
      - config:/etc/pterodactyl
    environment:
      - TZ=${DAEMON_TIMEZONE:-UTC}
    ports:
      - '2022:2022'
    restart: unless-stopped
    privileged: true

  ##
  # -- MariaDB --
  # Required for the control panel to work.
  # Stores Server/User information
  ##
  mariadb:
    image: mariadb:12.3.2@sha256:b1c7bf836e64ed9406a8984af29509f40089d55cea14b32f12c4726a1f17104b
    container_name: pterodactyl_db
    volumes:
      - mysql:/var/lib/mysql
    env_file: ./mariadb.env
    networks:
      default:
        aliases:
          - mysql
    restart: unless-stopped

  ##
  # -- Pterodactyl Panel --
  # This is the container that provides the main web interface.
  ##
  panel:
    image: ccarney16/pterodactyl-panel:v1.12.4@sha256:10fc65ed7b0f7fa5b3717de2d64c7bd08a9fcf0d64fba468d40cd5523a83781b
    container_name: pterodactyl_panel
    depends_on:
      mariadb:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - panel:/data
    env_file: ./panel.env
    restart: unless-stopped
    labels:
      - homepage.group=Games
      - homepage.name=Pterodactyl
      - homepage.icon=pterodactyl
      - homepage.href=https://games.mattvperry.com
      - homepage.description=Game server management
      - homepage.widget.type=pterodactyl
      - homepage.widget.url=https://games.mattvperry.com
      - homepage.widget.key=${PTERO_API_KEY}

  ##
  # -- Redis --
  ##
  redis:
    image: redis:8.8.0@sha256:4c7ecf5d14207f5baf8e140ab428a54ae5cf2a0411956f75deb0ef89d3cb4fda
    container_name: pterodactyl_cache
    networks:
      default:
        aliases:
          - cache
    restart: unless-stopped
    cpu_count: 2
    mem_limit: 128m

  ##
  # -- Panel Worker --
  ##
  worker:
    image: ccarney16/pterodactyl-panel:v1.12.4@sha256:10fc65ed7b0f7fa5b3717de2d64c7bd08a9fcf0d64fba468d40cd5523a83781b
    container_name: pterodactyl_worker
    volumes:
      - panel:/data
    env_file: ./panel.env
    command: p:worker
    restart: unless-stopped

volumes:
  panel:
  mysql:
  config:
